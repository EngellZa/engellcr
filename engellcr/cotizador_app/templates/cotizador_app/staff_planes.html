{% extends 'cotizador_app/staff_base.html' %}
{% load cotizador_tags l10n %}
{% block title %}Planes{% endblock %}
{% block page_title %}Planes de Suscripción{% endblock %}
{% block content %}
<div class="row g-3">
{% for plan in planes %}
  <div class="col-md-3">
    <div class="card p-3">
      <form method="post">
        {% csrf_token %}<input type="hidden" name="plan_id" value="{{ plan.id }}">
        <h6>{{ plan.name }}</h6>
        <label class="form-label small">Precio (₡/mes)</label>
        <input type="number" name="price_crc" value="{{ plan.price_crc|unlocalize }}" class="form-control form-control-sm mb-2" step="0.01">
        <label class="form-label small">Precio ($/mes) — usado para PayPal</label>
        <input type="number" name="price_usd" value="{{ plan.price_usd|unlocalize }}" class="form-control form-control-sm mb-2" step="0.01">
        <label class="form-label small">Límite mensual (vacío = ilimitado)</label>
        <input type="number" name="monthly_quote_limit" value="{{ plan.monthly_quote_limit|default_if_none:'' }}" class="form-control form-control-sm mb-2">
        <div class="form-check mb-2">
          <input type="checkbox" name="is_active" class="form-check-input" {% if plan.is_active %}checked{% endif %}>
          <label class="form-check-label small">Activo</label>
        </div>
        <button class="btn btn-sm btn-primary w-100">Guardar</button>
      </form>
    </div>
  </div>
{% endfor %}
</div>
{% endblock %}
