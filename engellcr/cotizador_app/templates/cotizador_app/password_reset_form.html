<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Restablecer contraseña — Cotización Express</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh;">
<div class="container" style="max-width:420px;">
  <div class="card shadow-sm p-4">
    <h5 class="fw-bold mb-3">Restablecer contraseña</h5>
    <p class="text-muted small">Ingresá tu correo y te enviaremos instrucciones.</p>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">{{ form.email }}</div>
      <button type="submit" class="btn btn-primary w-100">Enviar</button>
    </form>
    <div class="text-center mt-3 small"><a href="{% url 'cotizador_app:login' %}">Volver a iniciar sesión</a></div>
  </div>
</div>
</body>
</html>
