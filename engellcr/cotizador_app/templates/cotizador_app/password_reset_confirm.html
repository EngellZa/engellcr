<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nueva contraseña — Cotización Express</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh;">
<div class="container" style="max-width:420px;">
  <div class="card shadow-sm p-4">
    <h5 class="fw-bold mb-3">Elegí una nueva contraseña</h5>
    {% if validlink %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-2">{{ form.new_password1 }}</div>
      <div class="mb-3">{{ form.new_password2 }}</div>
      <button type="submit" class="btn btn-primary w-100">Cambiar contraseña</button>
    </form>
    {% else %}
      <p class="text-danger">El enlace no es válido o ya expiró.</p>
    {% endif %}
  </div>
</div>
</body>
</html>
