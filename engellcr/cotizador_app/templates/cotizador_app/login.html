<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — Cotización Express</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --primary: #0d5c4f; --primary-dark: #08362e; --accent: #f59e0b; }
    body { background: linear-gradient(180deg, var(--primary-dark) 0%, var(--primary-dark) 220px, #f4f6fa 220px); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
    .auth-brand { display: flex; align-items: center; justify-content: center; gap: .5rem; color: #fff; font-weight: 800; font-size: 1.25rem; text-decoration: none; margin-bottom: 1.75rem; }
    .card { border: none; border-radius: 14px; box-shadow: 0 24px 48px -20px rgba(0,0,0,.35); }
    .btn-primary { background: var(--primary); border-color: var(--primary); font-weight: 600; }
    .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
    a { color: var(--primary); }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 .2rem rgba(13,92,79,.15); }
  </style>
</head>
<body class="d-flex align-items-center py-5">
<div class="container" style="max-width:420px;">
  <a class="auth-brand" href="{% url 'cotizador_app:landing' %}"><span style="font-size:1.4rem;">🧾</span> Cotización Express</a>
  <div class="card p-4 p-md-5">
    <h4 class="fw-bold text-center mb-4">Iniciá sesión</h4>
    {% if form.errors %}<div class="alert alert-danger py-2">Correo o contraseña incorrectos.</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        {{ form.username }}
      </div>
      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        {{ form.password }}
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2">Iniciar sesión</button>
    </form>
    <div class="text-center mt-4 small">
      <a href="{% url 'cotizador_app:password_reset' %}">¿Olvidaste tu contraseña?</a>
    </div>
    <div class="text-center mt-2 small">
      ¿No tenés cuenta? <a href="{% url 'cotizador_app:register' %}" class="fw-semibold">Creá una gratis</a>
    </div>
  </div>
</div>
</body>
</html>
