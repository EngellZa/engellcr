<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — Cotización Express CR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh;">
<div class="container" style="max-width:420px;">
  <div class="card shadow-sm p-4">
    <h4 class="fw-bold text-center mb-3">🧾 Cotización Express CR</h4>
    {% if form.errors %}<div class="alert alert-danger py-2">Correo o contraseña incorrectos.</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        {{ form.username }}
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        {{ form.password }}
      </div>
      <button type="submit" class="btn btn-primary w-100">Iniciar sesión</button>
    </form>
    <div class="text-center mt-3 small">
      <a href="{% url 'cotizador_app:password_reset' %}">¿Olvidaste tu contraseña?</a>
    </div>
    <div class="text-center mt-2 small">
      ¿No tenés cuenta? <a href="{% url 'cotizador_app:register' %}">Creá una gratis</a>
    </div>
  </div>
</div>
</body>
</html>
